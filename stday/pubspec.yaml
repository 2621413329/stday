name: stday
description: 温暖陪伴型成长伙伴 — 学生端 MVP
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  intl: ^0.20.2
  flame: ^1.37.0
  speech_to_text: ^7.4.0
  permission_handler: ^12.0.3
  flame_3d: ^0.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
    image_path: assets/app_icon.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/app_icon.png
  image_path: assets/app_icon.png
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/3d/models/
    - assets/3d/models/hero.glb
    - assets/3d/models/tree_pine.glb
    - assets/3d/models/tree_puffy.glb
    - assets/3d/models/rock.glb
    - assets/3d/models/island_ground.glb
    - assets/images/buildings/
    - assets/images/decor/
    - assets/images/story_tags/
